name: Playwright BDD Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Required permissions for publishing test results
permissions:
  contents: read
  issues: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # MUST BE FIRST
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: '**/pom.xml'
    
    - name: Build project
      run: mvn clean install -DskipTests
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: target/

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: '**/pom.xml'
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: target/
    
    - name: Run tests on dev environment
      run: mvn test -Denv=dev
    
    - name: Upload Cucumber reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports
        path: target/cucumber-reports.html
    
    - name: Upload TestNG reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports
        path: test-output/
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/testng-cucumber-reports.xml
        check_name: Test Results - Dev Environment
