name: Playwright BDD Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  issues: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Verify pom.xml exists
      run: |
        echo "Current directory: $(pwd)"
        ls -la
        if [ -f pom.xml ]; then
          echo "✓ pom.xml found"
        else
          echo "✗ pom.xml NOT found - attempting to locate it"
          find . -name "pom.xml" -type f
          exit 1
        fi
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven
        cache-dependency-path: pom.xml

    - name: Build project
      run: mvn clean install -DskipTests -Denv=dev -Dexecution.headless=true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: target/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # Fixed indentation here
        java-version: '21'
        cache: maven
        cache-dependency-path: pom.xml
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: target/

    # Install system dependencies required by Playwright
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libnspr4 \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libcups2 \
          libxkbcommon0 \
          libxdamage1 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libcairo2 \
          xdg-utils \
          wget

    # Install Playwright browsers using npx (more reliable)
    - name: Install Playwright Browsers
      run: |
        npx -y playwright install chromium firefox webkit --with-deps

    - name: Run tests on dev environment
      run: mvn test -Denv=dev -Dexecution.headless=true
      continue-on-error: true # Ensures reports are uploaded even if tests fail
    
    - name: Upload Cucumber reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports
        path: target/cucumber-reports.html
    
    - name: Upload TestNG reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports
        path: test-output/
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/testng-cucumber-reports.xml
        check_name: Test Results - Dev Environment
